# Pre-commit hooks for VedaAide project
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Black code formatter
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: ["--line-length=100"]

  # isort - import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  # Trailing whitespace and fix-byte-order-marker
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
        exclude: ^\.vscode/
      - id: check-merge-conflict
      - id: debug-statements
      - id: name-tests-test
        args: ['--pytest-test-first']

  # flake8 - style and error checking
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--ignore=E203,E226,W503,W504"]
        exclude: |
          (?x)^(
            .temp/.*|
            htmlcov/.*|
            langfuse_storage/.*|
            qdrant_storage/.*
          )$

  # pylint - linting (local hook: uses project venv, avoids Windows encoding issues)
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        language: system
        entry: python
        args: ["-m", "pylint", "--max-line-length=100"]
        types: [python]
        files: ^(src|tests)/
        stages: [commit]

  # mypy - type checking (local hook: uses project venv for correct module resolution)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: python
        args: ["-m", "mypy", "--no-implicit-optional", "--warn-redundant-casts", "src", "tests"]
        types: [python]
        pass_filenames: false
        require_serial: true
