services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333" # HTTP API & Dashboard
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage

  zookeeper:
    image: zookeeper:latest
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOO_CFG_EXTRA: "metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider metricsProvider.httpPort=7070"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres_langfuse
    restart: always
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/docker/clickhouse-users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./infra/docker/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./infra/docker/clickhouse-zookeeper.xml:/etc/clickhouse-server/config.d/zookeeper.xml
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_password@postgres:5432/langfuse
      CLICKHOUSE_URL: http://default:changeme@clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:changeme@clickhouse:9000/default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: changeme
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "local"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ""
      SALT: "this_is_a_test_salt_change_in_production_to_something_secure_123"
      NEXTAUTH_SECRET: your_secret_key_change_this_to_secure_value
      NEXTAUTH_URL: http://langfuse:3000

volumes:
  postgres_data:
  clickhouse_data:
