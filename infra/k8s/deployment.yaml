apiVersion: apps/v1
kind: Deployment
metadata:
  name: vedaaide-api
  namespace: vedaaide-dev
  labels:
    app: vedaaide-api
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vedaaide-api
  template:
    metadata:
      labels:
        app: vedaaide-api
    spec:
      containers:
      - name: vedaaide-api
        image: vedaaide:latest
        imagePullPolicy: Never   # 本地镜像，不从远端拉取（kind load docker-image）
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: vedaaide-secrets
            optional: true
        - configMapRef:
            name: vedaaide-config
            optional: true
        env:
        - name: ENV
          value: "development"
        - name: LOG_LEVEL
          value: "DEBUG"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vedaaide-api
  namespace: vedaaide-dev
  labels:
    app: vedaaide-api
spec:
  selector:
    app: vedaaide-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vedaaide-config
  namespace: vedaaide-dev
data:
  ENV: "development"
  LOG_LEVEL: "DEBUG"
  QDRANT_URL: "http://qdrant:6333"
